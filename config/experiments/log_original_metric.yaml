# Log-space training + original-space tuning metric

data:
  file_path: "data/processed/2026.3.9-11864_feature_parameters_raw.csv"
  target_column: "Nexp (kN)"

  target_transform:
    enabled: true
    type: "log"

  columns_to_drop:
    - "b (mm)"
    - "h (mm)"
    - "r0 (mm)"
    - "t (mm)"
    - "L (mm)"
    - "lambda"

  test_size: 0.2
  random_state: 42

  split:
    strategy: "regression_stratified"
    target_bins: 10
    auxiliary_features:
      - column: "Ac (mm^2)"
        bins: 3
      - column: "lambda"
        bins: 3
    min_stratum_size: 12

model:
  params:
    objective: "reg:squarederror"
    max_depth: 6
    learning_rate: 0.04411666122575092
    n_estimators: 4066
    subsample: 0.7038011848542036
    colsample_bytree: 0.4714919226150699
    min_child_weight: 6
    reg_alpha: 0.033505711876129954
    reg_lambda: 0.1408673338811182
    gamma: 0.00020676219564729034
    random_state: 42
    tree_method: "hist"
    device: "cpu"
    n_jobs: -1

  use_optuna: true
  optuna_metric_space: "original"
  cv_metric_space: "original"
  n_trials: 200
  optuna_timeout: 14400
  optuna_storage_url: "sqlite:///logs/optuna_study.db"
  best_params_path: "logs/best_params_log_stratified_original_200.json"

  early_stopping_rounds: 100
  eval_metric: "rmse"
  validation_size: 0.15

cv:
  n_splits: 5
  random_state: 42
  shuffle: true

evaluation:
  regime_analysis:
    enabled: true
    regimes:
      - name: "capacity"
        source: "target"
        bins: 5
      - name: "section_area"
        source: "feature"
        column: "Ac (mm^2)"
        bins: 4
      - name: "slenderness"
        source: "feature"
        column: "lambda"
        bins: 4

paths:
  output_dir: "output/log_original_metric_stratified_200"
  model_dir: "models"
  model_output: "xgboost_model.pkl"
  preprocessor_output: "preprocessor.pkl"
  feature_names_output: "feature_names.json"
  metadata_output: "training_metadata.json"
  feature_importance_plot: "feature_importance.png"
  predictions_plot: "predictions_vs_actual.png"
  evaluation_report: "evaluation_report.json"
  logs_dir: "logs"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_name: "cfst_xgboost.log"
